<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfect Tenses Master | PTE Academic</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #4A90D9; --primary-dark: #2C6FAC;
            --success: #27AE60; --error: #E74C3C; --warning: #F39C12;
            --bg: #F0F4F8; --card: #FFFFFF; --text: #2D3748;
            --text-light: #718096; --border: #E2E8F0;
            --l1: #27AE60; --l2: #2980B9; --l3: #8E44AD; --l4: #E67E22; --l5: #E74C3C;
        }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

        /* ── HEADER ── */
        .header {
            background: linear-gradient(135deg, #1a365d 0%, #2a69ac 100%);
            color: white; padding: 14px 24px;
            display: flex; align-items: center; justify-content: space-between;
            position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 12px rgba(0,0,0,0.25);
        }
        .header h1 { font-size: 1.2rem; font-weight: 700; }
        .header-sub { font-size: 0.72rem; opacity: 0.75; margin-top: 2px; }
        .header-stats { display: flex; gap: 24px; align-items: center; }
        .stat-item { text-align: center; font-size: 0.72rem; opacity: 0.85; }
        .stat-value { font-size: 1.25rem; font-weight: 700; color: #FFD700; display: block; }
        .streak-val { color: #FF8C00; }

        /* ── MAIN ── */
        .main { max-width: 100%; margin: 0; padding: 24px 32px 60px; }

        /* ── LEVEL NAV ── */
        .level-nav { display: flex; gap: 8px; margin-bottom: 20px; overflow-x: auto; padding-bottom: 4px; }
        .level-btn {
            flex-shrink: 0; padding: 8px 16px; border: 2px solid transparent;
            border-radius: 20px; cursor: pointer; font-size: 0.78rem; font-weight: 600;
            background: white; color: var(--text); transition: all 0.2s;
        }
        .level-btn[data-lv="1"] { border-color: var(--l1); }
        .level-btn[data-lv="1"].active { background: var(--l1); color: white; }
        .level-btn[data-lv="2"] { border-color: var(--l2); }
        .level-btn[data-lv="2"].active { background: var(--l2); color: white; }
        .level-btn[data-lv="3"] { border-color: var(--l3); }
        .level-btn[data-lv="3"].active { background: var(--l3); color: white; }
        .level-btn[data-lv="4"] { border-color: var(--l4); }
        .level-btn[data-lv="4"].active { background: var(--l4); color: white; }
        .level-btn[data-lv="5"] { border-color: var(--l5); }
        .level-btn[data-lv="5"].active { background: var(--l5); color: white; }

        /* ── PROGRESS ── */
        .progress-section {
            background: white; border-radius: 12px; padding: 14px 20px;
            margin-bottom: 18px; box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }
        .progress-info { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 0.84rem; }
        .level-title-text { font-weight: 700; color: var(--primary-dark); }
        .progress-bar { height: 8px; background: var(--border); border-radius: 4px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--primary); border-radius: 4px; transition: width 0.5s ease; }

        /* ── GRAMMAR REF ── */
        .grammar-ref { background: #EBF8FF; border: 1px solid #BEE3F8; border-radius: 12px; margin-bottom: 18px; overflow: hidden; }
        .grammar-ref-header {
            padding: 12px 20px; cursor: pointer; display: flex; justify-content: space-between;
            align-items: center; font-weight: 600; color: #2B6CB0; user-select: none; font-size: 0.9rem;
        }
        .grammar-ref-header:hover { background: #BEE3F8; }
        .grammar-body { display: none; padding: 0 16px 16px; }
        .grammar-body.open { display: block; }
        .tense-card {
            background: white; border-radius: 8px; padding: 12px 14px;
            margin-top: 10px; border-left: 4px solid var(--primary);
        }
        .tense-card h4 { color: var(--primary-dark); margin-bottom: 6px; font-size: 0.88rem; }
        .formula-tag {
            font-family: monospace; background: #F7FAFC; padding: 3px 8px;
            border-radius: 4px; font-size: 0.82rem; display: inline-block; margin-bottom: 6px;
        }
        .tense-uses { font-size: 0.8rem; color: var(--text-light); margin: 4px 0 6px 14px; }
        .tense-uses li { margin-bottom: 2px; }
        .tense-ex { font-size: 0.8rem; font-style: italic; color: #4A5568; margin-bottom: 2px; }

        /* ── QUESTION CARD ── */
        .q-card {
            background: white; border-radius: 16px; padding: 26px 28px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08); margin-bottom: 16px;
            animation: slideIn 0.3s ease;
        }
        @keyframes slideIn { from { opacity:0; transform: translateY(12px); } to { opacity:1; transform: translateY(0); } }
        .q-meta { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 14px; }
        .badge { padding: 3px 10px; border-radius: 12px; font-size: 0.72rem; font-weight: 600; }
        .b-tense { background: #EBF8FF; color: #2B6CB0; }
        .b-type  { background: #F0FFF4; color: #276749; }
        .b-diff  { background: #FFFAF0; color: #744210; }
        .q-instruction { font-size: 0.83rem; color: var(--text-light); font-style: italic; margin-bottom: 12px; }
        .q-sentence { font-size: 1.1rem; line-height: 1.7; margin-bottom: 20px; }
        .blank { display: inline-block; min-width: 110px; border-bottom: 2px solid var(--primary); color: var(--primary); font-weight: 600; }

        /* ── OPTIONS ── */
        .options-grid { display: grid; gap: 10px; }
        .opt-btn {
            padding: 13px 18px; border: 2px solid var(--border); border-radius: 10px;
            cursor: pointer; text-align: left; font-size: 0.93rem; background: white;
            transition: all 0.18s; color: var(--text);
        }
        .opt-btn:hover:not(:disabled) { border-color: var(--primary); background: #EBF8FF; }
        .opt-btn.correct { border-color: var(--success); background: #F0FFF4; color: var(--success); font-weight: 600; }
        .opt-btn.incorrect { border-color: var(--error); background: #FFF5F5; color: var(--error); }
        .opt-btn:disabled { cursor: default; }

        /* ── FILL INPUT ── */
        .fill-row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; margin-top: 4px; }
        .fill-input {
            flex: 1; min-width: 200px; padding: 11px 16px;
            border: 2px solid var(--border); border-radius: 10px; font-size: 0.97rem; outline: none;
            transition: border-color 0.2s;
        }
        .fill-input:focus { border-color: var(--primary); }
        .fill-input.correct { border-color: var(--success); background: #F0FFF4; }
        .fill-input.incorrect { border-color: var(--error); background: #FFF5F5; }
        .verb-hint { font-size: 0.8rem; color: var(--text-light); margin-top: 7px; }

        .check-btn {
            padding: 11px 22px; background: var(--primary); color: white;
            border: none; border-radius: 10px; cursor: pointer; font-size: 0.93rem;
            font-weight: 600; transition: background 0.2s; white-space: nowrap;
        }
        .check-btn:hover { background: var(--primary-dark); }
        .check-btn:disabled { background: #CBD5E0; cursor: default; }

        /* ── SOURCE (transform/error) ── */
        .source-box {
            background: #F7FAFC; border-left: 4px solid var(--primary);
            border-radius: 0 8px 8px 0; padding: 13px 16px;
            margin-bottom: 14px; font-size: 0.93rem; line-height: 1.6;
        }
        .error-box {
            background: #FFF5F5; border: 1px solid #FED7D7; border-radius: 8px;
            padding: 13px 16px; margin-bottom: 14px; font-size: 1rem; line-height: 1.7;
        }
        .text-area {
            width: 100%; padding: 11px 16px; border: 2px solid var(--border); border-radius: 10px;
            font-size: 0.93rem; outline: none; transition: border-color 0.2s;
            resize: vertical; min-height: 60px; font-family: inherit;
        }
        .text-area:focus { border-color: var(--primary); }

        /* ── FEEDBACK ── */
        .feedback { margin-top: 18px; border-radius: 12px; overflow: hidden; display: none; }
        .feedback.show { display: block; }
        .fb-header {
            padding: 13px 18px; font-weight: 700; font-size: 0.95rem;
            display: flex; align-items: center; gap: 8px;
        }
        .fb-correct  { background: #F0FFF4; color: #276749; border: 1px solid #9AE6B4; }
        .fb-wrong    { background: #FFF5F5; color: #C53030; border: 1px solid #FEB2B2; }
        .fb-hint     { background: #FFFAF0; color: #744210; border: 1px solid #F6AD55; }
        .fb-body { padding: 15px 18px; background: white; border: 1px solid var(--border); border-top: none; }
        .answer-box {
            background: #FFFAF0; border: 1px solid #F6AD55; border-radius: 8px;
            padding: 9px 13px; margin-bottom: 10px; font-size: 0.88rem;
        }
        .rule-box { font-size: 0.88rem; margin-bottom: 10px; }
        .expl-box { font-size: 0.86rem; color: #4A5568; margin-bottom: 10px; }
        .ex-box { background: #F7FAFC; border-radius: 8px; padding: 10px 12px; font-size: 0.84rem; }
        .ex-box p { margin-bottom: 3px; font-style: italic; }
        .ex-box p:last-child { margin-bottom: 0; }

        /* ── NAV ── */
        .nav-buttons { display: flex; justify-content: flex-end; margin-top: 16px; }
        .next-btn {
            padding: 12px 28px; background: var(--primary); color: white;
            border: none; border-radius: 10px; cursor: pointer; font-size: 0.93rem;
            font-weight: 600; transition: all 0.2s;
        }
        .next-btn:hover { background: var(--primary-dark); transform: translateX(2px); }
        .next-btn:disabled { background: #CBD5E0; cursor: default; transform: none; }

        /* ── LEVEL COMPLETE ── */
        .level-complete {
            background: white; border-radius: 16px; padding: 44px 36px;
            text-align: center; box-shadow: 0 4px 20px rgba(0,0,0,0.08); display: none;
        }
        .level-complete.show { display: block; animation: slideIn 0.4s ease; }
        .complete-icon { font-size: 4rem; margin-bottom: 14px; }
        .complete-title { font-size: 1.6rem; font-weight: 700; margin-bottom: 8px; }
        .complete-msg { color: var(--text-light); margin-bottom: 24px; font-size: 0.95rem; }
        .complete-stats { display: flex; justify-content: center; gap: 40px; margin-bottom: 30px; }
        .cs-val { font-size: 2rem; font-weight: 700; color: var(--primary); display: block; }
        .cs-lbl { font-size: 0.78rem; color: var(--text-light); }
        .continue-btn {
            padding: 14px 40px; background: var(--primary); color: white;
            border: none; border-radius: 12px; font-size: 1rem; font-weight: 700;
            cursor: pointer; transition: background 0.2s;
        }
        .continue-btn:hover { background: var(--primary-dark); }

        @media (max-width: 600px) {
            .q-card { padding: 18px 14px; }
            .q-sentence { font-size: 0.97rem; }
            .complete-stats { gap: 20px; }
        }
    </style>
</head>
<body>

<div class="header">
    <div>
        <h1>⚡ Perfect Tenses Master</h1>
        <div class="header-sub">PTE Academic · Grammar Training</div>
    </div>
    <div class="header-stats">
        <div class="stat-item">
            <span class="stat-value" id="hXP">0</span>XP
        </div>
        <div class="stat-item">
            <span class="stat-value streak-val">🔥 <span id="hStreak">0</span></span>Streak
        </div>
        <div class="stat-item">
            <span class="stat-value" id="hAcc">—</span>Accuracy
        </div>
    </div>
</div>

<div class="main">

    <div class="level-nav" id="level-nav">
        <button class="level-btn active" data-lv="1" onclick="goLevel(1)">Level 1 · Present Perfect</button>
        <button class="level-btn" data-lv="2" onclick="goLevel(2)">Level 2 · Past Perfect</button>
        <button class="level-btn" data-lv="3" onclick="goLevel(3)">Level 3 · Future Perfect</button>
        <button class="level-btn" data-lv="4" onclick="goLevel(4)">Level 4 · Continuous</button>
        <button class="level-btn" data-lv="5" onclick="goLevel(5)">Level 5 · Mixed Challenge</button>
    </div>

    <div class="progress-section">
        <div class="progress-info">
            <span class="level-title-text" id="lvTitle">Level 1 — Present Perfect Simple</span>
            <span id="qCounter">Question 1 of 8</span>
        </div>
        <div class="progress-bar"><div class="progress-fill" id="progFill" style="width:0%"></div></div>
    </div>

    <div class="grammar-ref">
        <div class="grammar-ref-header" onclick="toggleGrammar()">
            📚 Grammar Reference — tap to expand
            <span id="gramArrow">▼</span>
        </div>
        <div class="grammar-body" id="gramBody"></div>
    </div>

    <div id="qArea"></div>

    <div class="level-complete" id="lvComplete">
        <div class="complete-icon" id="cpIcon">🏆</div>
        <div class="complete-title" id="cpTitle">Level Complete!</div>
        <div class="complete-msg" id="cpMsg"></div>
        <div class="complete-stats">
            <div><span class="cs-val" id="cpXP">0</span><span class="cs-lbl">XP Earned</span></div>
            <div><span class="cs-val" id="cpAcc">0%</span><span class="cs-lbl">Accuracy</span></div>
            <div><span class="cs-val" id="cpScore">0/0</span><span class="cs-lbl">Correct</span></div>
        </div>
        <button class="continue-btn" id="cpBtn">Continue →</button>
    </div>

</div>

<script>
// ═══════════════════════════════════════════════════════════
// QUESTIONS DATABASE
// ═══════════════════════════════════════════════════════════
const Q = {

// ─── LEVEL 1: Present Perfect Simple ────────────────────────────────────────
1: [
  {
    type:'mc', tense:'Present Perfect Simple', diff:'⭐ Easy',
    instr:'Select the correct verb form.',
    sent:'The research team ___ significant findings in their latest study.',
    opts:['have published','has published','had published','will have published'],
    cor:1,
    rule:'<strong>HAS</strong> with singular subjects (he/she/it/team). <strong>HAVE</strong> with plural or I/you/we/they.',
    expl:'"The research team" is treated as singular in academic English → <strong>HAS published</strong>.',
    exs:['The scientist <em>has discovered</em> a new compound. (singular)','Scientists <em>have discovered</em> many compounds. (plural)']
  },
  {
    type:'fill', tense:'Present Perfect Simple', diff:'⭐ Easy',
    instr:'Fill in the blank with the correct form of the verb in parentheses.',
    sent:'Global temperatures ___ (rise) by 1.2°C since pre-industrial times.',
    ans:['have risen'],
    hint:'RISE → rose → <strong>risen</strong> (irregular past participle)',
    rule:'Present Perfect = HAVE/HAS + <strong>past participle</strong> (not simple past).',
    expl:'"Temperatures" = plural → <strong>HAVE</strong>. Past participle of "rise" = "risen" (not "rose").',
    exs:['"Temperatures <em>have risen</em> sharply." ✓','"Temperatures <em>have rose</em>." ✗ (wrong — "rose" is simple past, not past participle)']
  },
  {
    type:'mc', tense:'Present Perfect Simple', diff:'⭐ Easy',
    instr:'Select the correct form. Pay attention to the time expression.',
    sent:'She ___ three academic papers on climate change this semester.',
    opts:['wrote','has written','have written','had wrote'],
    cor:1,
    rule:'Use Present Perfect (not Simple Past) when the time period is <strong>not finished</strong>: "today", "this week", "this semester".',
    expl:'"This semester" is still ongoing → Present Perfect. "She" = singular → <strong>HAS written</strong>.',
    exs:['"She <em>has written</em> three papers <em>this semester</em>." ✓ (semester ongoing)','<em>"She <em>wrote</em> three papers <em>last semester</em>." ✓ (finished → Simple Past)']
  },
  {
    type:'fill', tense:'Present Perfect Simple', diff:'⭐ Easy',
    instr:'Fill in the blank.',
    sent:'The government ___ (implement) several new education policies in recent years.',
    ans:['has implemented'],
    hint:'IMPLEMENT → implemented (regular verb)',
    rule:'"In recent years", "recently", "lately" are <strong>Present Perfect signals</strong>.',
    expl:'"The government" = singular → <strong>HAS</strong>. "In recent years" = unfinished reference → Present Perfect.',
    exs:['"The government <em>has implemented</em> new policies recently." ✓','"Researchers <em>have implemented</em> new methods." ✓ (plural)']
  },
  {
    type:'mc', tense:'Present Perfect Simple', diff:'⭐⭐ Medium',
    instr:'Which sentence is grammatically correct and uses Present Perfect appropriately?',
    sent:'Choose the best option:',
    opts:[
      'Researchers have found a cure last year.',
      'Researchers have found evidence of improvement recently.',
      'Researchers has found evidence of improvement recently.',
      'Researchers have been found a cure last year.'
    ],
    cor:1,
    rule:'NEVER use Present Perfect with specific finished times: <strong>yesterday, last week, in 2020, three days ago.</strong>',
    expl:'"Recently" ✓ signals Present Perfect. "Last year" ✗ requires Simple Past. "Researchers" = plural → HAVE (not has).',
    exs:['"They <em>have found</em> evidence <em>recently</em>." ✓ (no specific time)','"They <em>found</em> evidence <em>last year</em>." ✓ (specific finished time)']
  },
  {
    type:'fill', tense:'Present Perfect Simple', diff:'⭐⭐ Medium',
    instr:'Careful — "The number of" takes a singular verb!',
    sent:'The number of people living in urban areas ___ (increase) dramatically over the past decade.',
    ans:['has increased'],
    hint:'INCREASE → increased (regular). Subject = "The number" (singular)',
    rule:'"<strong>The number of</strong> + noun" → singular verb (HAS). "<strong>A number of</strong> + noun" → plural verb (HAVE).',
    expl:'"The number of people" → subject = "the number" = singular → <strong>HAS increased</strong>.',
    exs:['"<em>The number of</em> students <em>has</em> grown." ✓','"<em>A number of</em> students <em>have</em> passed." ✓']
  },
  {
    type:'error', tense:'Present Perfect Simple', diff:'⭐⭐ Medium',
    instr:'Find the subject-verb agreement error and type the corrected full sentence.',
    err:'Scientists have recently discovered that the brain have developed new neural pathways in response to learning.',
    fix:['scientists have recently discovered that the brain has developed new neural pathways in response to learning'],
    highlight:'have developed → has developed (brain = singular)',
    rule:'In complex sentences, check <strong>each subject-verb pair independently</strong>.',
    expl:'First clause: "scientists have discovered" ✓ (plural). Second clause: "the brain" is singular → <strong>HAS developed</strong> ✓.',
    exs:['"...that the brain <em>has developed</em>..." ✓','"...that neurons <em>have developed</em>..." ✓ (plural subject)']
  },
  {
    type:'transform', tense:'Present Perfect Simple', diff:'⭐⭐⭐ Hard',
    instr:'Combine these sentences using Present Perfect to show past action → present result.',
    src:'Scientists conducted extensive research. The field of medicine now has better treatments.',
    model:'Scientists have conducted extensive research, leading to better treatments in medicine.',
    keys:['have conducted','have done','have carried out'],
    rule:'Present Perfect connects <strong>past action → present result</strong>. This is essential for PTE writing tasks.',
    expl:'The research (completed past) is connected to the present result (better treatments). Use Present Perfect to make this link explicit.',
    exs:['"They <em>have studied</em> this for years, and now we understand it better." ✓','"Research <em>has shown</em> that diet affects health." ✓ (past research → present knowledge)']
  }
],

// ─── LEVEL 2: Past Perfect Simple ───────────────────────────────────────────
2: [
  {
    type:'mc', tense:'Past Perfect Simple', diff:'⭐ Easy',
    instr:'Select the correct form. Which action happened first?',
    sent:'By the time the report was published, the researchers ___ their data three times.',
    opts:['have verified','verified','had verified','has verified'],
    cor:2,
    rule:'Past Perfect (HAD + pp) = the action that happened <strong>FIRST</strong> in a sequence of past events.',
    expl:'Verifying happened FIRST → Past Perfect: <strong>had verified</strong>. Publishing happened SECOND → Simple Past.',
    exs:['"By the time the results came out, they <em>had already analyzed</em> the data." ✓','"When she arrived, the lecture <em>had started</em>." ✓']
  },
  {
    type:'fill', tense:'Past Perfect Simple', diff:'⭐ Easy',
    instr:'Fill in the blank using Past Perfect.',
    sent:'The professor realized that he ___ (forget) to include the key references in his paper.',
    ans:['had forgotten'],
    hint:'FORGET → forgot → <strong>forgotten</strong> (irregular)',
    rule:'HAD + past participle — same for ALL subjects (I/you/he/she/we/they had).',
    expl:'"Forgetting" happened BEFORE "realizing" → Past Perfect: <strong>had forgotten</strong>.',
    exs:['"He realized he <em>had forgotten</em> his notes." ✓','"She discovered she <em>had made</em> an error." ✓']
  },
  {
    type:'mc', tense:'Past Perfect Simple', diff:'⭐ Easy',
    instr:'Select the correct form.',
    sent:'The experiment failed because the team ___ the correct procedure.',
    opts:['has not followed','had not followed','did not followed','have not followed'],
    cor:1,
    rule:'Negative Past Perfect = <strong>HAD NOT (hadn\'t) + past participle</strong>.',
    expl:'The failure was in the past; not following the procedure happened even EARLIER → Past Perfect negative.',
    exs:['"The test failed because they <em>hadn\'t calibrated</em> the equipment." ✓','"She failed because she <em>had not studied</em> enough." ✓']
  },
  {
    type:'fill', tense:'Past Perfect Simple', diff:'⭐⭐ Medium',
    instr:'Fill in the blank.',
    sent:'After the committee ___ (review) all the applications, they announced their decision.',
    ans:['had reviewed'],
    hint:'REVIEW → reviewed (regular)',
    rule:'After/before/by the time/when → use Past Perfect for the <strong>first action</strong>.',
    expl:'Reviewing (first) → <strong>had reviewed</strong>. Announcing (second) → Simple Past.',
    exs:['"<em>After</em> she <em>had finished</em> the research, she began writing." ✓','"<em>Before</em> they <em>had gathered</em> enough evidence, they couldn\'t publish." ✓']
  },
  {
    type:'mc', tense:'Past Perfect Simple', diff:'⭐⭐ Medium',
    instr:'Choose the grammatically correct sentence.',
    sent:'Which sentence uses Past Perfect correctly?',
    opts:[
      'She had lived in three countries before she turned 25.',
      'She has lived in three countries before she turned 25.',
      'She lived in three countries before she had turned 25.',
      'She had been lived in three countries before she turned 25.'
    ],
    cor:0,
    rule:'The <strong>EARLIER</strong> action gets Past Perfect. The LATER past action uses Simple Past.',
    expl:'Living (earlier, had lived) → Past Perfect. Turning 25 (later) → Simple Past. Option C incorrectly puts Past Perfect on the later action.',
    exs:['"She <em>had graduated</em> before she found a job." ✓','"She found a job after she <em>had graduated</em>." ✓']
  },
  {
    type:'transform', tense:'Past Perfect Simple', diff:'⭐⭐ Medium',
    instr:'Combine these sentences, making clear which action happened first.',
    src:'Step 1: The scientists collected the samples. Step 2: They began the analysis.',
    model:'The scientists had collected the samples before they began the analysis.',
    keys:['had collected','had gathered'],
    rule:'Timeline: [Past Perfect — first action] → then → [Simple Past — second action].',
    expl:'"Collecting" happened first → Past Perfect. "Beginning the analysis" → Simple Past.',
    exs:['"They <em>had prepared</em> thoroughly before the experiment <em>started</em>." ✓','"By the time the meeting <em>began</em>, she <em>had already written</em> the proposal." ✓']
  },
  {
    type:'fill', tense:'Past Perfect Simple', diff:'⭐⭐⭐ Hard',
    instr:'Fill in the blank. This uses a negative form in an academic context.',

function toggleGrammar() {
  const b = document.getElementById('gramBody');
  b.classList.toggle('open');
  document.getElementById('gramArrow').textContent = b.classList.contains('open') ? '▲' : '▼';
}

function renderGram(lv) {
  const ref = GRAM[lv];
  let h = '';
  ref.cards.forEach(c => {
    h += `<div class="tense-card" style="border-left-color:${c.color}">
      <h4>${c.name}</h4>
      <div class="formula-tag">${c.formula}</div>
      <ul class="tense-uses">${c.uses.map(u => `<li>${u}</li>`).join('')}</ul>
      ${c.exs.map(e => `<div class="tense-ex">• ${e}</div>`).join('')}
    </div>`;
  });
  document.getElementById('gramBody').innerHTML = h;
}

// ═══════════════════════════════════════════════════════════
// RENDER QUESTION
// ═══════════════════════════════════════════════════════════
function renderQ() {
  const qs = Q[S.lv];
  if (S.idx >= qs.length) { showLvComplete(); return; }
  const q = qs[S.idx];
  S.answered = false; S.wrongTries = 0;
  const area = document.getElementById('qArea');
  const typeLabels = { mc: 'Multiple Choice', fill: 'Fill in Blank', transform: 'Sentence Transform', error: 'Error Correction' };
  let body = '';
  if (q.type === 'mc')        body = buildMC(q);
  else if (q.type === 'fill') body = buildFill(q);
  else if (q.type === 'transform') body = buildTransform(q);
  else if (q.type === 'error')     body = buildError(q);

  area.innerHTML = `
    <div class="q-card">
      <div class="q-meta">
        <span class="badge b-tense">${q.tense}</span>
        <span class="badge b-type">${typeLabels[q.type]}</span>
        <span class="badge b-diff">${q.diff}</span>
      </div>
      <div class="q-instruction">${q.instr}</div>
      ${body}
      <div class="feedback" id="feedback"></div>
    </div>
    <div class="nav-buttons">
      <button class="next-btn" id="nextBtn" onclick="nextQ()" disabled>Next Question →</button>
    </div>`;
  if (q.type === 'fill') setTimeout(() => document.getElementById('fillIn')?.focus(), 80);
  if (q.type === 'transform' || q.type === 'error') setTimeout(() => document.getElementById('textIn')?.focus(), 80);
  updateProgress();
}

function buildMC(q) {
  return `<div class="q-sentence">${q.sent}</div>
    <div class="options-grid">${q.opts.map((o, i) =>
      `<button class="opt-btn" onclick="checkMC(${i})">${o}</button>`).join('')}</div>`;
}

function buildFill(q) {
  const s = q.sent.replace('___', '<span class="blank">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span>');
  return `<div class="q-sentence">${s}</div>
    <div class="fill-row">
      <input class="fill-input" id="fillIn" type="text" placeholder="Type your answer..." onkeypress="if(event.key==='Enter') checkFill()">
      <button class="check-btn" id="checkFillBtn" onclick="checkFill()">Check ✓</button>
    </div>
    ${q.hint ? `<div class="verb-hint">💡 ${q.hint}</div>` : ''}`;
}

function buildTransform(q) {
  return `<div class="source-box">${q.src}</div>
    <div class="q-instruction">Write your combined/rewritten sentence:</div>
    <textarea class="text-area" id="textIn" rows="3" placeholder="Type your answer here..."></textarea>
    <button class="check-btn" id="checkTxBtn" onclick="checkTransform()" style="margin-top:10px;">Check ✓</button>`;
}

function buildError(q) {
  return `<div class="error-box">${q.err}</div>
    <div class="q-instruction">Type the corrected sentence:</div>
    <textarea class="text-area" id="textIn" rows="2" placeholder="Write the corrected sentence..."></textarea>
    <button class="check-btn" id="checkTxBtn" onclick="checkError()" style="margin-top:10px;">Check ✓</button>`;
}

// ═══════════════════════════════════════════════════════════
// CHECK ANSWERS
// ═══════════════════════════════════════════════════════════
function norm(s) {
  return s.toLowerCase().replace(/['']/g,"'").replace(/\s+/g,' ').trim();
}

function checkMC(i) {
  if (S.answered) return;
  const q = Q[S.lv][S.idx];
  const btns = document.querySelectorAll('.opt-btn');
  btns.forEach(b => b.disabled = true);
  const ok = i === q.cor;
  btns[q.cor].classList.add('correct');
  if (!ok) btns[i].classList.add('incorrect');
  finish(ok, q);
}

function checkFill() {
  if (S.answered) return;
  const q = Q[S.lv][S.idx];
  const inp = document.getElementById('fillIn');
  const val = inp.value.trim();
  if (!val) return;
  // Handle two-blank answers (separated by /)
  let ok = false;
  if (q.ans[0].includes('/')) {
    // two blanks — check if user wrote both key parts
    const parts = q.ans[0].split('/').map(p => norm(p.trim()));
    ok = parts.every(p => norm(val).includes(p));
  } else {
    ok = q.ans.some(a => norm(val) === norm(a));
  }
  if (!ok && S.wrongTries === 0) {
    S.wrongTries++;
    inp.classList.add('incorrect');
    setTimeout(() => inp.classList.remove('incorrect'), 600);
    showHint(q);
    return;
  }
  inp.disabled = true;
  document.getElementById('checkFillBtn').disabled = true;
  inp.classList.add(ok ? 'correct' : 'incorrect');
  finish(ok, q);
}

function checkTransform() {
  if (S.answered) return;
  const q = Q[S.lv][S.idx];
  const val = document.getElementById('textIn').value.trim();
  if (!val) return;
  const ok = q.keys.some(k => norm(val).includes(norm(k)));
  if (!ok && S.wrongTries === 0) {
    S.wrongTries++;
    showHint(q);
    return;
  }
  document.getElementById('textIn').disabled = true;
  document.getElementById('checkTxBtn').disabled = true;
  finish(ok, q);
}

function checkError() {
  if (S.answered) return;
  const q = Q[S.lv][S.idx];
  const val = document.getElementById('textIn').value.trim();
  if (!val) return;
  const firstWords = q.fix[0].split(' ').slice(0, 5).join(' ');
  const ok = norm(val).includes(norm(firstWords));
  if (!ok && S.wrongTries === 0) {
    S.wrongTries++;
    showHint(q);
    return;
  }
  document.getElementById('textIn').disabled = true;
  document.getElementById('checkTxBtn').disabled = true;
  finish(ok, q);
}

// ═══════════════════════════════════════════════════════════
// FINISH / SCORING
// ═══════════════════════════════════════════════════════════
function finish(ok, q) {
  S.answered = true;
  const xpEarned = ok ? (S.wrongTries === 0 ? 10 : 5) : 2;
  if (ok) { S.streak++; S.lvStats.correct++; S.global.correct++; }
  else { S.streak = 0; }
  S.xp += xpEarned; S.lvStats.xp += xpEarned;
  S.lvStats.total++; S.global.total++;
  updateHeader();
  showFeedback(ok, q, false);
  document.getElementById('nextBtn').disabled = false;
}

function updateHeader() {
  document.getElementById('hXP').textContent = S.xp;
  document.getElementById('hStreak').textContent = S.streak;
  if (S.global.total > 0) {
    document.getElementById('hAcc').textContent = Math.round(S.global.correct / S.global.total * 100) + '%';
  }
}

// ═══════════════════════════════════════════════════════════
// FEEDBACK
// ═══════════════════════════════════════════════════════════
function showHint(q) {
  const fb = document.getElementById('feedback');
  fb.innerHTML = `
    <div class="fb-header fb-hint">💡 Not quite — check the hint and try again!</div>
    <div class="fb-body">
      ${q.highlight ? `<div class="answer-box">🔍 <strong>Clue:</strong> ${q.highlight}</div>` : ''}
      <div class="rule-box">📖 <strong>Rule:</strong> ${q.rule}</div>
    </div>`;
  fb.classList.add('show');
}

function showFeedback(ok, q, _) {
  const fb = document.getElementById('feedback');
  let correctAns = '';
  if (!ok) {
    const ans = q.ans ? q.ans[0] : q.opts ? q.opts[q.cor] : q.model || q.fix?.[0] || '';
    correctAns = `<div class="answer-box">✏️ <strong>Correct answer:</strong> ${ans}</div>`;
  }
  const xp = ok ? (S.wrongTries === 0 ? 10 : 5) : 2;
  const streakMsg = ok && S.streak > 2 ? ` 🔥 ${S.streak}-streak bonus!` : '';

  fb.innerHTML = `
    <div class="fb-header ${ok ? 'fb-correct' : 'fb-wrong'}">
      ${ok ? `✅ Correct! +${xp} XP${streakMsg}` : '❌ Incorrect — review the rule below'}
    </div>
    <div class="fb-body">
      ${correctAns}
      ${q.highlight && !ok ? `<div class="answer-box">🔍 <strong>Error identified:</strong> ${q.highlight}</div>` : ''}
      <div class="rule-box">📖 <strong>Rule:</strong> ${q.rule}</div>
      <div class="expl-box">💡 <strong>Explanation:</strong> ${q.expl}</div>
      <div class="ex-box"><strong>Examples:</strong>${q.exs.map(e => `<p>• ${e}</p>`).join('')}</div>
      ${q.type === 'transform' || q.type === 'error' ? `<div class="answer-box" style="margin-top:10px;">📝 <strong>Model answer:</strong> ${q.model || q.fix?.[0] || ''}</div>` : ''}
    </div>`;
  fb.classList.add('show');
  fb.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

// ═══════════════════════════════════════════════════════════
// NAVIGATION
// ═══════════════════════════════════════════════════════════
function nextQ() {
  S.idx++;
  renderQ();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function updateProgress() {
  const total = Q[S.lv].length;
  const cur = Math.min(S.idx + 1, total);
  document.getElementById('lvTitle').textContent = LV_TITLES[S.lv];
  document.getElementById('qCounter').textContent = `Question ${cur} of ${total}`;
  document.getElementById('progFill').style.width = (S.idx / total * 100) + '%';
}

// ═══════════════════════════════════════════════════════════
// LEVEL COMPLETE
// ═══════════════════════════════════════════════════════════
function showLvComplete() {
  document.getElementById('qArea').style.display = 'none';
  const acc = S.lvStats.total > 0 ? Math.round(S.lvStats.correct / S.lvStats.total * 100) : 0;
  document.getElementById('cpIcon').textContent = S.lv === 5 ? '🎓' : '🏆';
  document.getElementById('cpTitle').textContent = S.lv === 5 ? 'All Levels Complete!' : `Level ${S.lv} Complete!`;
  document.getElementById('cpMsg').textContent = LV_MSGS[S.lv];
  document.getElementById('cpXP').textContent = '+' + S.lvStats.xp;
  document.getElementById('cpAcc').textContent = acc + '%';
  document.getElementById('cpScore').textContent = `${S.lvStats.correct}/${S.lvStats.total}`;
  const btn = document.getElementById('cpBtn');
  if (S.lv >= 5) {
    btn.textContent = 'Restart from Level 1 ↺';
    btn.onclick = () => goLevel(1);
  } else {
    btn.textContent = `Continue to Level ${S.lv + 1} →`;
    btn.onclick = () => goLevel(S.lv + 1);
  }
  document.getElementById('lvComplete').classList.add('show');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

init();
</script>
